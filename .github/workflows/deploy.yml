name: Deploy Hugo site to Pages

on:
  # 推送到 main 分支时自动部署
  push:
    branches: [ main ]

  # 允许手动触发部署
  workflow_dispatch:

# 权限配置
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # 必须开启，否则主题子模块不会被拉取
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.2'  # 和你本地版本完全一致
          extended: true  # Dream 主题必须用 Extended 版本

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: hugo --gc --minify --baseURL "https://skylaf.github.io/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4